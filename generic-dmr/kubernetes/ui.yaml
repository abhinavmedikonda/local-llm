apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  labels:
    app: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
      - name: ui
        image: yidadaa/chatgpt-next-web:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: OPENAI_API_KEY
          value: "sk-dummy"
        - name: BASE_URL
          value: "http://dmr:12434/engines"
        - name: CUSTOM_MODELS
          value: "-all,docker.io/ai/smollm2:135M-Q4_K_M"
        - name: HIDE_USER_API_KEY
          value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: ui
spec:
  selector:
    app: ui
  ports:
  - port: 80
    targetPort: 3000
    name: http
  type: NodePort
